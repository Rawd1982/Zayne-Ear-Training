<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitch Training Virtual Piano</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        /* Specific Chroma-Note Palette variables for keys */
        :root {
            --color-c: #ff2a2a; /* Red */
            --color-d: #ffa500; /* Orange */
            --color-e: #ffd700; /* Yellow */
            --color-f: #008000; /* Green */
            --color-g: #008080; /* Teal */
            --color-a: #0000ff; /* Blue */
            --color-b: #8a2be2; /* Purple */
        }

        .white-key {
            height: 200px;
            width: 60px;
            z-index: 1;
            transition: all 0.1s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .white-key:active, .white-key.active {
            transform: translateY(2px);
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.15);
        }

        .black-key {
            height: 120px;
            width: 36px;
            margin-left: -18px;
            margin-right: -18px;
            z-index: 2;
            background-color: #1a1a1a;
            transition: all 0.1s ease;
        }

        .black-key:active, .black-key.active {
            background-color: #333333;
        }

        /* Subtle bottom border accent using the visual palette */
        .key-c { border-bottom: 8px solid var(--color-c); }
        .key-d { border-bottom: 8px solid var(--color-d); }
        .key-e { border-bottom: 8px solid var(--color-e); }
        .key-f { border-bottom: 8px solid var(--color-f); }
        .key-g { border-bottom: 8px solid var(--color-g); }
        .key-a { border-bottom: 8px solid var(--color-a); }
        .key-b { border-bottom: 8px solid var(--color-b); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between font-sans antialiased">

    <header class="w-full max-w-4xl mx-auto px-6 pt-8 pb-4 text-center">
        <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-red-400 via-yellow-400 to-blue-500 bg-clip-text text-transparent">
            Pitch Training Studio
        </h1>
        <p class="text-slate-400 mt-2 text-sm md:text-base">
            Select a mode to begin training. Audio will initialize on your first interaction.
        </p>
    </header>

    <main class="w-full max-w-4xl mx-auto px-4 flex flex-col items-center justify-center flex-grow gap-8">
        
        <div class="w-full max-w-md bg-slate-800/80 backdrop-blur-md rounded-2xl p-6 border border-slate-700/50 text-center shadow-xl">
            <div id="game-status" class="text-xs uppercase tracking-widest text-slate-400 font-semibold mb-1">
                Free Play Mode
            </div>
            <div id="feedback-display" class="text-2xl font-bold text-slate-200 min-h-[40px] flex items-center justify-center">
                Play a note to start
            </div>
        </div>

        <div class="flex gap-4 justify-center">
            <button id="btn-free" class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-blue-600 hover:bg-blue-500 shadow-md transition-colors cursor-pointer">
                Free Play
            </button>
            <button id="btn-quiz" class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-slate-700 hover:bg-slate-600 transition-colors cursor-pointer">
                New Ear Training Prompt
            </button>
        </div>

        <div class="w-full overflow-x-auto py-6 flex justify-center scrolling-touch">
            <div id="keyboard" class="flex bg-slate-950 p-4 rounded-3xl shadow-2xl border border-slate-800 select-none">
                <div class="white-key key-c bg-white rounded-l-xl flex flex-col justify-end pb-3 text-center text-slate-500 font-bold text-xs" data-note="C4">C4</div>
                <div class="black-key rounded-b-md" data-note="C#4"></div>
                <div class="white-key key-d bg-white flex flex-col justify-end pb-3 text-center text-slate-500 font-bold text-xs" data-note="D4">D4</div>
                <div class="black-key rounded-b-md" data-note="D#4"></div>
                <div class="white-key key-e bg-white flex flex-col justify-end pb-3 text-center text-slate-500 font-bold text-xs" data-note="E4">E4</div>
                <div class="white-key key-f bg-white flex flex-col justify-end pb-3 text-center text-slate-500 font-bold text-xs" data-note="F4">F4</div>
                <div class="black-key rounded-b-md" data-note="F#4"></div>
                <div class="white-key key-g bg-white flex flex-col justify-end pb-3 text-center text-slate-500 font-bold text-xs" data-note="G4">G4</div>
                <div class="black-key rounded-b-md" data-note="G#4"></div>
                <div class="white-key key-a bg-white flex flex-col justify-end pb-3 text-center text-slate-500 font-bold text-xs" data-note="A4">A4</div>
                <div class="black-key rounded-b-md" data-note="A#4"></div>
                <div class="white-key key-b bg-white flex flex-col justify-end pb-3 text-center text-slate-500 font-bold text-xs" data-note="B4">B4</div>
                <div class="white-key key-c bg-white flex flex-col justify-end pb-3 text-center text-slate-500 font-bold text-xs" data-note="C5">C5</div>
                <div class="black-key rounded-b-md" data-note="C#5"></div>
                <div class="white-key key-d bg-white flex flex-col justify-end pb-3 text-center text-slate-500 font-bold text-xs" data-note="D5">D5</div>
                <div class="black-key rounded-b-md" data-note="D#5"></div>
                <div class="white-key key-e bg-white rounded-r-xl flex flex-col justify-end pb-3 text-center text-slate-500 font-bold text-xs" data-note="E5">E5</div>
            </div>
        </div>

    </main>

    <footer class="w-full text-center py-6 text-xs text-slate-500 border-t border-slate-800/60 mt-8">
        Custom Ear-Training App &bull; Designed for Auditory Precision
    </footer>

    <script>
        // Setup Polysynth with a mellow piano-like envelope configuration
        const synth = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "triangle" },
            envelope: { attack: 0.02, decay: 0.1, sustain: 0.3, release: 0.8 }
        }).toDestination();

        let targetNote = null;
        let isQuizMode = false;

        // All available keys in our designated app range
        const validNotes = ["C4", "C#4", "D4", "D#4", "E4", "F4", "F#4", "G4", "G#4", "A4", "A#4", "B4", "C5", "C#5", "D5", "D#5", "E5"];

        const feedbackDisplay = document.getElementById("feedback-display");
        const gameStatus = document.getElementById("game-status");
        const btnFree = document.getElementById("btn-free");
        const btnQuiz = document.getElementById("btn-quiz");

        // UI Event Listeners for mouse/touch execution
        document.querySelectorAll('.white-key, .black-key').forEach(key => {
            key.addEventListener('mousedown', (e) => handleNoteTrigger(e.target.dataset.note));
            key.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleNoteTrigger(e.target.dataset.note);
            });
        });

        function handleNoteTrigger(note) {
            // Guarantee context is running for web audio API compliance
            if (Tone.context.state !== 'running') {
                Tone.start();
            }
            
            synth.triggerAttackRelease(note, "4n");
            visualFeedback(note);

            if (isQuizMode && targetNote) {
                evaluateGuess(note);
            } else {
                feedbackDisplay.textContent = `Playing: ${note}`;
                feedbackDisplay.className = "text-2xl font-bold text-blue-400 min-h-[40px] flex items-center justify-center";
            }
        }

        function visualFeedback(note) {
            const el = document.querySelector(`[data-note="${note}"]`);
            if (el) {
                el.classList.add('active');
                setTimeout(() => el.classList.remove('active'), 150);
            }
        }

        function startQuizMode() {
            isQuizMode = true;
            btnQuiz.className = "px-5 py-2.5 rounded-xl text-sm font-semibold bg-amber-500 hover:bg-amber-400 text-slate-950 transition-colors cursor-pointer shadow-md";
            btnFree.className = "px-5 py-2.5 rounded-xl text-sm font-semibold bg-slate-700 hover:bg-slate-600 text-slate-100 transition-colors cursor-pointer";
            gameStatus.textContent = "Ear Training Quiz Mode";
            
            // Pick random target note
            targetNote = validNotes[Math.floor(Math.random() * validNotes.length)];
            feedbackDisplay.textContent = "Listen closely...";
            feedbackDisplay.className = "text-2xl font-bold text-amber-400 min-h-[40px] flex items-center justify-center";
            
            // Play target pitch after a short gap
            setTimeout(() => {
                synth.triggerAttackRelease(targetNote, "2n");
                feedbackDisplay.textContent = "Which note was that?";
            }, 600);
        }

        function clearQuizMode() {
            isQuizMode = false;
            targetNote = null;
            btnFree.className = "px-5 py-2.5 rounded-xl text-sm font-semibold bg-blue-600 hover:bg-blue-500 shadow-md transition-colors cursor-pointer";
            btnQuiz.className = "px-5 py-2.5 rounded-xl text-sm font-semibold bg-slate-700 hover:bg-slate-600 transition-colors cursor-pointer";
            gameStatus.textContent = "Free Play Mode";
            feedbackDisplay.textContent = "Play a note to start";
            feedbackDisplay.className = "text-2xl font-bold text-slate-200 min-h-[40px] flex items-center justify-center";
        }

        function evaluateGuess(guessedNote) {
            if (guessedNote === targetNote) {
                feedbackDisplay.textContent = `Correct! It was ${targetNote} 🎉`;
                feedbackDisplay.className = "text-2xl font-bold text-emerald-400 min-h-[40px] flex items-center justify-center";
                // Reset automatically after short delay to let them absorb the win
                setTimeout(startQuizMode, 1500);
            } else {
                feedbackDisplay.textContent = `Try again! You played ${guessedNote}`;
                feedbackDisplay.className = "text-2xl font-bold text-rose-400 min-h-[40px] flex items-center justify-center";
            }
        }

        btnQuiz.addEventListener('click', startQuizMode);
        btnFree.addEventListener('click', clearQuizMode);
    </script>
</body>
</html>
